<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - 任务进度管理器</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 2h10 0 002a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
          <span>TaskFlow</span>
        </div>

        <nav class="nav-menu">
          <button class="nav-item active" data-view="tasks" data-type="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            全部任务
          </button>
          <button class="nav-item" data-view="tasks" data-type="daily">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            每日任务
          </button>
          <button class="nav-item" data-view="tasks" data-type="weekly">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            每周任务
          </button>
          <button class="nav-item" data-view="tasks" data-type="monthly">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
            </svg>
            每月任务
          </button>
        </nav>

        <div class="nav-divider"></div>

        <nav class="nav-menu">
          <button class="nav-item" data-view="expired" data-type="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            过期任务
            <span class="expired-badge" id="expired-count" style="display: none;">0</span>
          </button>
        </nav>

        <div class="nav-divider"></div>

        <nav class="nav-menu">
          <button class="nav-item" data-view="history" data-type="completed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            提交记录
          </button>
          <button class="nav-item" data-view="history" data-type="uncompleted">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            未完成历史
          </button>
        </nav>

        <div class="stats-card">
          <div class="stats-title">统计概览</div>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-value" id="stat-total">0</span>
              <span class="stat-label">总任务</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="stat-completed">0</span>
              <span class="stat-label">已完成</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="stat-pending">0</span>
              <span class="stat-label">待完成</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="stat-rate">0%</span>
              <span class="stat-label">完成率</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <header class="header">
          <h1 class="page-title" id="page-title">全部任务</h1>
          <div class="header-actions">
            <button class="btn-add btn-batch" id="btn-batch-task">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </svg>
              批量创建
            </button>
            <button class="btn-add" id="btn-add-task">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              新建任务
            </button>
          </div>
        </header>

        <!-- 任务列表视图 -->
        <div class="view-container" id="view-tasks">
          <div class="task-list" id="task-list">
            <!-- 任务将在这里动态渲染 -->
          </div>
          <div class="empty-state" id="empty-tasks" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <p>暂无任务</p>
            <span>点击上方"新建任务"添加第一个任务</span>
          </div>
        </div>

        <!-- 过期任务视图 -->
        <div class="view-container" id="view-expired" style="display: none;">
          <div class="expired-warning">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span>以下任务已过期，请尽快处理</span>
          </div>
          <div class="task-list" id="expired-list">
            <!-- 过期任务将在这里动态渲染 -->
          </div>
          <div class="empty-state" id="empty-expired" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <p>没有过期任务</p>
            <span>太好了！所有任务都在正常进度中</span>
          </div>
        </div>

        <!-- 历史记录视图 -->
        <div class="view-container" id="view-history" style="display: none;">
          <div class="query-panel">
            <div class="query-row">
              <div class="query-group">
                <label>时间类型</label>
                <select id="query-date-field">
                  <option value="created_at">创建时间</option>
                  <option value="due_date">截止时间</option>
                  <option value="completed_at">完成时间</option>
                </select>
              </div>
              <div class="query-group">
                <label>任务类型</label>
                <select id="query-task-type">
                  <option value="all">全部</option>
                  <option value="daily">每日</option>
                  <option value="weekly">每周</option>
                  <option value="monthly">每月</option>
                </select>
              </div>
            </div>
            <div class="query-row">
              <div class="query-group">
                <label>开始日期</label>
                <input type="date" id="query-start-date">
              </div>
              <div class="query-group">
                <label>结束日期</label>
                <input type="date" id="query-end-date">
              </div>
              <button class="btn-query" id="btn-query">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                查询
              </button>
            </div>
          </div>
          <div class="task-list" id="history-list">
            <!-- 历史任务将在这里动态渲染 -->
          </div>
          <div class="empty-state" id="empty-history" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <p>暂无记录</p>
            <span>调整查询条件试试</span>
          </div>
        </div>
      </main>
    </div>

    <!-- 新建任务弹窗 -->
    <div class="modal" id="modal-new-task">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>新建任务</h2>
          <button class="modal-close" id="modal-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form class="modal-form" id="form-new-task">
          <div class="form-group">
            <label for="task-title">任务标题</label>
            <input type="text" id="task-title" placeholder="输入任务名称..." required>
          </div>
          <div class="form-group">
            <label for="task-type">任务类型</label>
            <div class="type-selector">
              <label class="type-option">
                <input type="radio" name="task-type" value="daily" checked>
                <span class="type-badge daily">每日</span>
              </label>
              <label class="type-option">
                <input type="radio" name="task-type" value="weekly">
                <span class="type-badge weekly">每周</span>
              </label>
              <label class="type-option">
                <input type="radio" name="task-type" value="monthly">
                <span class="type-badge monthly">每月</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label for="task-due-date">截止日期（可选）</label>
            <input type="date" id="task-due-date">
          </div>
          <div class="form-actions">
            <button type="button" class="btn-cancel" id="btn-cancel">取消</button>
            <button type="submit" class="btn-submit">创建任务</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 批量创建任务弹窗 -->
    <div class="modal" id="modal-batch-task">
      <div class="modal-backdrop"></div>
      <div class="modal-content modal-batch">
        <div class="modal-header">
          <h2>批量创建任务</h2>
          <button class="modal-close" id="modal-batch-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form class="modal-form" id="form-batch-task">
          <div class="form-group">
            <label for="batch-tasks">任务标题（每行一个任务）</label>
            <textarea id="batch-tasks" placeholder="输入任务名称，每行一个&#10;例如：&#10;学习Rust基础&#10;完成项目练习&#10;阅读技术文档" rows="6"></textarea>
            <div class="batch-hint">每行一个任务，支持批量添加</div>
          </div>
          <div class="form-group">
            <label for="batch-task-type">任务类型</label>
            <div class="type-selector">
              <label class="type-option">
                <input type="radio" name="batch-task-type" value="daily" checked>
                <span class="type-badge daily">每日</span>
              </label>
              <label class="type-option">
                <input type="radio" name="batch-task-type" value="weekly">
                <span class="type-badge weekly">每周</span>
              </label>
              <label class="type-option">
                <input type="radio" name="batch-task-type" value="monthly">
                <span class="type-badge monthly">每月</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label for="batch-due-date">截止日期（可选）</label>
            <input type="date" id="batch-due-date">
          </div>
          <div class="form-actions">
            <button type="button" class="btn-cancel" id="btn-batch-cancel">取消</button>
            <button type="submit" class="btn-submit btn-batch-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </svg>
              批量创建
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
